# Haptica AI landing (famit.in) — hardened static-file nginx config.
#
# This is a COMPLETE replacement of /etc/nginx/nginx.conf (see ../Dockerfile).
# Threat model + rationale for every section below: ../SECURITY.md
#
# Context: this box sits BEHIND Cloudflare, and the DigitalOcean Cloud
# Firewall (deploy/provision-landing-droplet.py) locks inbound 80/443 to
# Cloudflare's own IP ranges only — so everything nginx sees has already
# passed through Cloudflare's edge (Bot Fight Mode, managed WAF, rate-limit
# rule). nginx's own hardening below is DEFENSE IN DEPTH, not the only layer.

worker_processes auto;
pid /tmp/nginx.pid;                 # non-root (uid 101); /tmp is a tmpfs mount

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # Hide the nginx version (and therefore known-CVE fingerprinting) from
    # every response, including error pages.
    server_tokens off;

    # Static GET/HEAD-only site: nothing here ever needs a request body, and
    # with no proxying, none of the temp-file features are actually used —
    # but nginx insists these paths exist/are writable, so point them at the
    # /tmp tmpfs (writable by the non-root user) instead of the default
    # /var/cache/nginx (which would need extra chowning for no real benefit).
    client_max_body_size     1k;
    client_body_buffer_size  1k;
    client_body_temp_path    /tmp/client_temp;
    proxy_temp_path          /tmp/proxy_temp;
    fastcgi_temp_path        /tmp/fastcgi_temp;
    uwsgi_temp_path          /tmp/uwsgi_temp;
    scgi_temp_path           /tmp/scgi_temp;

    # Base image symlinks these to /dev/stdout and /dev/stderr, so this is
    # `docker logs`-visible without needing a writable /var/log/nginx.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml
        font/woff font/woff2 application/manifest+json;

    # Cache policy by file type, applied via a single `add_header` block at
    # server level (see below). Doing it as a map — instead of add_header
    # inside each location{} — avoids the classic nginx gotcha where a
    # location-level add_header SILENTLY DISCARDS every header inherited from
    # the parent context (security headers included) the moment that location
    # declares its own add_header.
    map $uri $cache_control {
        default                                              "no-cache";
        ~*\.(?:css|js|mjs)$                                   "public, max-age=31536000, immutable";
        ~*\.(?:woff2?|ttf|otf|eot)$                           "public, max-age=31536000, immutable";
        ~*\.(?:png|jpe?g|gif|svg|ico|webp|avif)$              "public, max-age=31536000, immutable";
        ~*\.(?:html)$                                         "no-cache";
    }

    # --- Restore the real visitor IP from Cloudflare -----------------------
    # Without this, every request appears to come from Cloudflare's own edge
    # IP, which breaks per-IP rate limiting below and any future log-based
    # abuse analysis. Ranges per https://www.cloudflare.com/ips/ (fetched
    # 2026-07-07 — Cloudflare changes these rarely; re-check periodically,
    # see SECURITY.md).
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # --- Rate limiting (bot / abuse hardening) ------------------------------
    # Light burst allowance for real page loads (a page pulls index.html +
    # several _next/static assets near-instantly); sustained hammering past
    # the burst gets a 429, not a 503. This is a SECOND layer behind
    # Cloudflare's own rate-limit rule (deploy/cf-setup.py) — belt and braces.
    limit_req_zone $binary_remote_addr zone=landing_rl:10m rate=10r/s;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=landing_conn:10m;
    limit_conn_status 429;

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name famit.in www.famit.in _;

        root  /usr/share/nginx/html;
        index index.html;

        # --- Security headers (see SECURITY.md for the full threat model) --
        # CSP tuned for a self-contained Next.js static export:
        #   style-src 'unsafe-inline'  -> styled-jsx + next/font inject
        #                                 inline <style> tags at build time.
        #   connect-src / form-action  -> the one place this site talks to
        #                                 the live app it markets, so both are
        #                                 scoped to exactly that origin and
        #                                 nothing else.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://haptica.famit.in; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://haptica.famit.in; upgrade-insecure-requests" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=()" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        # Legacy header; explicitly OFF per modern guidance (CSP supersedes
        # it, and the old browser XSS auditors it toggled had their own bugs).
        add_header X-XSS-Protection "0" always;
        add_header Cache-Control $cache_control always;

        # --- Method allow-list (GET/HEAD only — this is a static site) -----
        # Known-but-unsupported verbs -> a real, debuggable 405.
        if ($request_method ~ ^(POST|PUT|DELETE|PATCH|OPTIONS|TRACE|CONNECT)$) {
            return 405;
        }
        # Anything else (malformed / exotic verbs scanners and bots probe
        # with) -> 444: nginx closes the connection with NO response at all,
        # so the scanner doesn't even get a status code to fingerprint.
        if ($request_method !~ ^(GET|HEAD)$) {
            return 444;
        }

        # Deny dotfiles (.env, .git, .well-known excluded below for ACME/etc.)
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }

        # Container/orchestrator healthcheck — its own location so it is
        # naturally OUTSIDE location /'s rate limiter below (locations don't
        # inherit from sibling locations, only from server{}), and excluded
        # from access logging so monitoring never pollutes the real logs.
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        error_page 404 =404 /404.html;   # Next export emits out/404.html

        # Next.js static export with trailingSlash:true emits directory-style
        # output (e.g. out/features/index.html). This try_files chain serves
        # that correctly whether the request arrives with or without the
        # trailing slash, plus plain hashed asset files under /_next/static/.
        location / {
            limit_req  zone=landing_rl burst=20 nodelay;
            limit_conn landing_conn 20;
            try_files $uri $uri.html $uri/index.html $uri/ =404;
        }
    }
}
